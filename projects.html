<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects - BlissIO</title>
    <link rel="stylesheet" href="/Style.css">
    <link rel="icon" type="image/x-icon" href="/icon.png">
</head>
<body>
    <header>
        <a href="/index.html" class="back-link">← Back to Home</a>
        <h1>All Projects</h1>
    </header>

    <div class="container">
        <div class="controls">
            <div class="stats" id="stats">Loading repositories...</div>
            <div class="filter" id="filter">
                <button class="active" data-lang="all">All</button>
            </div>
        </div>

        <div class="projects-grid" id="projects-grid">
            <div class="loading">Loading all projects from GitHub...</div>
        </div>
    </div>

    <script>
        // === CONFIGURATION ===
        const GITHUB_USERNAME = 'blissio'; // Change to your username

        // Emoji map for languages
        const languageEmojis = {
            'JavaScript': '🟨',
            'Python': '🐍',
            'HTML': '🌐',
            'CSS': '🎨',
            'TypeScript': '💙',
            'Java': '☕',
            'C++': '⚡',
            'C': '🔧',
            'Ruby': '💎',
            'Go': '🐹',
            'Rust': '🦀',
            'PHP': '🐘',
            'Swift': '🍎',
            'Kotlin': '🟣',
            'Shell': '🐚',
            'C#': '🟪',
            'Lua': '🌙',
            'Dart': '🎯',
        };

        let allRepos = [];
        let currentFilter = 'all';

        // Fetch all repos from GitHub
        async function loadAllRepos() {
            const projectsGrid = document.getElementById('projects-grid');
            const statsEl = document.getElementById('stats');
            
            try {
                // Fetch all pages of repos
                let page = 1;
                let repos = [];
                let hasMore = true;

                while (hasMore) {
                    const response = await fetch(
                        `https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&page=${page}&sort=updated`
                    );
                    
                    if (!response.ok) {
                        throw new Error(`GitHub API error: ${response.status}`);
                    }

                    const pageRepos = await response.json();
                    
                    if (pageRepos.length === 0) {
                        hasMore = false;
                    } else {
                        repos = repos.concat(pageRepos);
                        page++;
                    }
                }

                allRepos = repos;
                
                // Update stats
                statsEl.textContent = `${repos.length} repositories found`;

                // Create language filter buttons
                createLanguageFilters(repos);

                // Display repos
                displayRepos(repos);

            } catch (error) {
                console.error('Error loading repos:', error);
                projectsGrid.innerHTML = `
                    <div class="error">
                        <p>Error loading repositories.</p>
                        <p style="font-size: 0.9rem; margin-top: 1rem;">Make sure the username "${GITHUB_USERNAME}" is correct.</p>
                    </div>
                `;
                statsEl.textContent = 'Error loading repositories';
            }
        }

        // Create language filter buttons
        function createLanguageFilters(repos) {
            const filterEl = document.getElementById('filter');
            const languages = new Set();
            
            repos.forEach(repo => {
                if (repo.language) {
                    languages.add(repo.language);
                }
            });

            // Clear existing filters except "All"
            filterEl.innerHTML = '<button class="active" data-lang="all">All</button>';

            // Add language filters
            Array.from(languages).sort().forEach(lang => {
                const btn = document.createElement('button');
                btn.textContent = lang;
                btn.dataset.lang = lang;
                btn.addEventListener('click', () => filterByLanguage(lang));
                filterEl.appendChild(btn);
            });

            // Add event listener to "All" button
            filterEl.querySelector('[data-lang="all"]').addEventListener('click', () => filterByLanguage('all'));
        }

        // Filter repos by language
        function filterByLanguage(lang) {
            currentFilter = lang;
            
            // Update active button
            document.querySelectorAll('.filter button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            // Filter and display
            const filtered = lang === 'all' 
                ? allRepos 
                : allRepos.filter(repo => repo.language === lang);
            
            displayRepos(filtered);
            
            // Update stats
            document.getElementById('stats').textContent = 
                `${filtered.length} of ${allRepos.length} repositories`;
        }

        // Display repos in grid
        function displayRepos(repos) {
            const projectsGrid = document.getElementById('projects-grid');
            projectsGrid.innerHTML = '';

            if (repos.length === 0) {
                projectsGrid.innerHTML = '<div class="loading">No repositories found.</div>';
                return;
            }

            repos.forEach(repo => {
                const card = document.createElement('a');
                card.className = 'project-card';
                card.href = repo.html_url;
                card.target = '_blank';
                
                const emoji = languageEmojis[repo.language] || '📦';
                const language = repo.language || 'Unknown';
                const description = repo.description || 'No description provided.';
                
                // Format dates
                const updatedDate = new Date(repo.updated_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                card.innerHTML = `
                    <div class="project-img">${emoji}</div>
                    <div class="project-content">
                        <h3 class="project-title">${repo.name}</h3>
                        <p class="project-desc">${description}</p>
                        <div class="project-stats">
                            <span class="stat">⭐ ${repo.stargazers_count}</span>
                            <span class="stat">🍴 ${repo.forks_count}</span>
                            <span class="stat">📅 ${updatedDate}</span>
                        </div>
                        <div class="project-tags">
                            <span class="tag">${language}</span>
                            ${repo.topics.slice(0, 3).map(topic => 
                                `<span class="tag">${topic}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;
                
                projectsGrid.appendChild(card);
            });
        }

        // Load repos on page load
        document.addEventListener('DOMContentLoaded', loadAllRepos);
    </script>
</body>
</html>
